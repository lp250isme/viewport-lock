<!doctype html>
<html>
<head><meta charset="utf-8"><style>body{margin:0;display:flex}svg{display:block}</style></head>
<body>
<!-- light -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="sq"><rect width="512" height="512" rx="108"/></clipPath>
    <radialGradient id="mesh1" cx="12%" cy="8%" r="80%">
      <stop offset="0%" stop-color="#bfe0ff"/><stop offset="100%" stop-color="#bfe0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mesh2" cx="95%" cy="5%" r="75%">
      <stop offset="0%" stop-color="#c8f4dd"/><stop offset="100%" stop-color="#c8f4dd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mesh3" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ded4fb"/><stop offset="100%" stop-color="#ded4fb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glassBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".82"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity=".5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#007aff" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#007aff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".9"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3499ff"/><stop offset="100%" stop-color="#007aff"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#sq)">
    <rect width="512" height="512" fill="#eef2f9"/>
    <rect width="512" height="512" fill="url(#mesh1)"/>
    <rect width="512" height="512" fill="url(#mesh2)"/>
    <rect width="512" height="512" fill="url(#mesh3)"/>
    <!-- 玻璃主體 -->
    <rect x="76" y="76" width="360" height="360" rx="84" fill="url(#glassBody)"/>
    <rect x="76" y="76" width="360" height="360" rx="84" fill="url(#glow)"/>
    <rect x="78" y="78" width="356" height="356" rx="82" fill="none" stroke="#ffffff" stroke-opacity=".85" stroke-width="3"/>
    <rect x="92" y="86" width="328" height="120" rx="70" fill="url(#spec)" opacity=".55"/>
    <!-- 掛鎖（viewport lock） -->
    <path d="M214 246 v-24 a42 42 0 0 1 84 0 v24" fill="none" stroke="#007aff" stroke-width="20" stroke-linecap="round"/>
    <rect x="194" y="242" width="124" height="120" rx="28" fill="url(#lock)"/>
    <circle cx="256" cy="290" r="16" fill="#ffffff"/>
    <rect x="248" y="296" width="16" height="38" rx="8" fill="#ffffff"/>
  </g>
</svg>
<!-- dark -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="sqd"><rect width="512" height="512" rx="108"/></clipPath>
    <radialGradient id="dmesh1" cx="12%" cy="8%" r="80%">
      <stop offset="0%" stop-color="#15304d"/><stop offset="100%" stop-color="#15304d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dmesh2" cx="95%" cy="5%" r="75%">
      <stop offset="0%" stop-color="#123528"/><stop offset="100%" stop-color="#123528" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dmesh3" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#241c45"/><stop offset="100%" stop-color="#241c45" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dglassBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3f" stop-opacity=".72"/>
      <stop offset="100%" stop-color="#1c1c20" stop-opacity=".6"/>
    </linearGradient>
    <radialGradient id="dglow" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#0a84ff" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dspec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".32"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dlock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a9bff"/><stop offset="100%" stop-color="#0a84ff"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#sqd)">
    <rect width="512" height="512" fill="#0b0b10"/>
    <rect width="512" height="512" fill="url(#dmesh1)"/>
    <rect width="512" height="512" fill="url(#dmesh2)"/>
    <rect width="512" height="512" fill="url(#dmesh3)"/>
    <rect x="76" y="76" width="360" height="360" rx="84" fill="url(#dglassBody)"/>
    <rect x="76" y="76" width="360" height="360" rx="84" fill="url(#dglow)"/>
    <rect x="78" y="78" width="356" height="356" rx="82" fill="none" stroke="#ffffff" stroke-opacity=".22" stroke-width="3"/>
    <rect x="92" y="86" width="328" height="120" rx="70" fill="url(#dspec)" opacity=".5"/>
    <path d="M214 246 v-24 a42 42 0 0 1 84 0 v24" fill="none" stroke="#0a84ff" stroke-width="20" stroke-linecap="round"/>
    <rect x="194" y="242" width="124" height="120" rx="28" fill="url(#dlock)"/>
    <circle cx="256" cy="290" r="16" fill="#eaf3ff"/>
    <rect x="248" y="296" width="16" height="38" rx="8" fill="#eaf3ff"/>
  </g>
</svg>
</body>
</html>
